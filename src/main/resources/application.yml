server:
  port: 8080

spring:
  datasource:
    url:      ${DB_URL:jdbc:postgresql://localhost:5432/chatapp}
    username: ${DB_USER:chatapp}
    password: ${DB_PASSWORD:chatapp123}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          time_zone: UTC
  web:
    resources:
      static-locations: classpath:/static/

logging:
  level:
    com.chatapp: INFO
    org.springframework.web.socket: WARN
    org.hibernate: WARN