<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>ChatApp</title>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    :root {
      --bg-app: #16181b;
      --bg-side: #111315;
      --bg-deep: #0b0d0f;
      --bg-input: #1c1f23;
      --bg-hover: #1a1d21;
      --bg-active: #212530;
      --bg-card: #141618;
      --bg-ele: #1f2228;
      --t1: #dde1e7;
      --t2: #9fa6b2;
      --tm: #5c6370;
      --tl: #4f9cf9;
      --accent: #5865F2;
      --ah: #4752C4;
      --aa: #3C45A5;
      --green: #3ba55d;
      --amber: #faa61a;
      --red: #ed4245;
      --offline: #5c6370;
      --r4: 4px;
      --r8: 8px;
      --r16: 16px;
    }

    html,
    body {
      height: 100%;
      overflow: hidden;
      background: var(--bg-deep)
    }

    body {
      font-family: 'gg sans', 'Noto Sans', Whitney, 'Helvetica Neue', Arial, sans-serif;
      font-size: 16px;
      color: var(--t1)
    }

    ::-webkit-scrollbar {
      width: 6px
    }

    ::-webkit-scrollbar-track {
      background: transparent
    }

    ::-webkit-scrollbar-thumb {
      background: #090a0b;
      border-radius: 3px
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #050607
    }

    button {
      cursor: pointer;
      border: none;
      background: none;
      color: inherit;
      font: inherit;
      outline: none
    }

    input,
    textarea {
      font: inherit;
      color: var(--t1);
      border: none;
      outline: none;
      background: none
    }

    svg {
      display: block
    }

    /* ── LOGIN ──────────────────────────────────────── */
    #login-screen {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(ellipse at 50% 0%, #1a1d2e 0%, var(--bg-deep) 70%);
      z-index: 9000;
    }

    .lc {
      background: var(--bg-card);
      border: 1px solid rgba(255, 255, 255, .06);
      border-radius: var(--r16);
      padding: 32px 36px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 24px 64px rgba(0, 0, 0, .7);
    }

    .lc h1 {
      font-size: 24px;
      font-weight: 700;
      text-align: center;
      margin-bottom: 4px;
      background: linear-gradient(135deg, var(--t1), var(--t2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent
    }

    .lc .sub {
      font-size: 13px;
      color: var(--tm);
      text-align: center;
      margin-bottom: 24px
    }

    .av-upload {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      margin-bottom: 20px
    }

    .av-ring {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      overflow: hidden;
      cursor: pointer;
      background: var(--bg-ele);
      border: 2px solid rgba(255, 255, 255, .1);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      font-weight: 700;
      color: var(--tm);
      position: relative;
      transition: border-color .2s, box-shadow .2s;
    }

    .av-ring:hover {
      border-color: var(--accent);
      box-shadow: 0 0 0 4px rgba(88, 101, 242, .2)
    }

    .av-ring img {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      display: none
    }

    .av-ring img.ok {
      display: block
    }

    .av-hint {
      font-size: 11px;
      color: var(--tm)
    }

    .fg {
      margin-bottom: 14px
    }

    .fg label {
      display: block;
      font-size: 11px;
      font-weight: 700;
      color: var(--t2);
      text-transform: uppercase;
      letter-spacing: .06em;
      margin-bottom: 6px
    }

    .fg input {
      width: 100%;
      padding: 10px 14px;
      background: var(--bg-deep);
      border-radius: var(--r4);
      color: var(--t1);
      font-size: 15px;
      border: 1.5px solid rgba(255, 255, 255, .08);
      transition: border-color .15s;
    }

    .fg input:focus {
      border-color: var(--accent)
    }

    .btn-p {
      width: 100%;
      padding: 11px;
      background: var(--accent);
      color: #fff;
      border-radius: var(--r4);
      font-size: 15px;
      font-weight: 600;
      transition: background .15s, transform .1s;
      margin-top: 6px;
      letter-spacing: .01em;
    }

    .btn-p:hover {
      background: var(--ah)
    }

    .btn-p:active {
      transform: scale(.98)
    }

    /* ── BANNER ─────────────────────────────────────── */
    #banner {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 8000;
      text-align: center;
      font-size: 13px;
      font-weight: 600;
      padding: 7px 12px;
      display: none;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    #banner.connecting {
      display: flex;
      background: #f0b132;
      color: #000
    }

    #banner.reconnecting {
      display: flex;
      background: var(--red);
      color: #fff
    }

    #banner.demo {
      display: flex;
      background: #1a4731;
      color: #4ade80;
      border-bottom: 1px solid #2d6b4a
    }

    /* ── APP GRID ───────────────────────────────────── */
    #app {
      display: grid;
      grid-template-columns: 68px 232px 1fr 232px;
      height: 100vh;
      overflow: hidden;
    }

    @media(max-width:960px) {
      #app {
        grid-template-columns: 68px 232px 1fr
      }

      #members-panel {
        display: none
      }
    }

    @media(max-width:600px) {
      #app {
        grid-template-columns: 1fr
      }

      #server-rail,
      #ch-panel {
        display: none
      }
    }

    /* ── SERVER RAIL ────────────────────────────────── */
    #server-rail {
      background: var(--bg-deep);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 12px 0;
      gap: 8px;
      overflow-y: auto;
      border-right: 1px solid rgba(255, 255, 255, .04);
    }

    .srv-icon {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 700;
      cursor: pointer;
      background: var(--bg-card);
      color: var(--t1);
      transition: border-radius .2s, background .2s, color .2s;
      position: relative;
      flex-shrink: 0;
    }

    .srv-icon:hover,
    .srv-icon.active {
      border-radius: 14px;
      background: var(--accent);
      color: #fff
    }

    .srv-pip {
      position: absolute;
      left: -6px;
      top: 50%;
      transform: translateY(-50%);
      width: 5px;
      border-radius: 0 3px 3px 0;
      background: var(--t1);
      height: 0;
      transition: height .2s;
      pointer-events: none;
    }

    .srv-icon:hover .srv-pip {
      height: 20px
    }

    .srv-icon.active .srv-pip {
      height: 40px
    }

    .srv-sep {
      width: 32px;
      height: 1px;
      background: rgba(255, 255, 255, .07);
      flex-shrink: 0
    }

    .srv-add {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: var(--bg-card);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      color: var(--green);
      cursor: pointer;
      flex-shrink: 0;
      transition: border-radius .2s, background .2s;
    }

    .srv-add:hover {
      border-radius: 14px;
      background: var(--green);
      color: #fff
    }

    /* ── CHANNEL PANEL ──────────────────────────────── */
    #ch-panel {
      background: var(--bg-side);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      border-right: 1px solid rgba(255, 255, 255, .03);
    }

    .srv-hdr {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px;
      font-weight: 700;
      font-size: 15px;
      cursor: pointer;
      border-bottom: 1px solid rgba(0, 0, 0, .4);
      flex-shrink: 0;
      letter-spacing: .01em;
    }

    .srv-hdr:hover {
      background: rgba(255, 255, 255, .03)
    }

    .ch-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px 0
    }

    .ch-cat {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 16px 8px 4px 8px;
      font-size: 11px;
      font-weight: 700;
      color: var(--tm);
      text-transform: uppercase;
      letter-spacing: .06em;
      cursor: pointer;
      user-select: none;
    }

    .ch-cat .cat-plus {
      margin-left: auto;
      width: 18px;
      height: 18px;
      border-radius: 3px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--tm);
      font-size: 16px;
      opacity: 0;
      transition: opacity .15s;
    }

    .ch-cat:hover .cat-plus {
      opacity: 1
    }

    .ch-cat:hover .cat-plus:hover {
      color: var(--t1)
    }

    .ch-item {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 5px 8px 5px 16px;
      margin: 1px 8px;
      border-radius: var(--r4);
      cursor: pointer;
      color: var(--tm);
      font-size: 15px;
      user-select: none;
    }

    .ch-item:hover {
      background: var(--bg-hover);
      color: var(--t2)
    }

    .ch-item.active {
      background: var(--bg-active);
      color: var(--t1)
    }

    .ch-icon {
      font-size: 16px;
      flex-shrink: 0;
      color: inherit;
      font-style: normal;
      width: 18px;
      text-align: center
    }

    .ch-badge {
      margin-left: auto;
      min-width: 16px;
      height: 16px;
      border-radius: 8px;
      background: var(--red);
      color: #fff;
      font-size: 11px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 4px;
    }

    /* user bar */
    #user-bar {
      background: #0d0f11;
      padding: 8px;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
      min-height: 52px;
      border-top: 1px solid rgba(255, 255, 255, .04);
    }

    .ub-info {
      flex: 1;
      min-width: 0
    }

    .ub-name {
      font-size: 13px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis
    }

    .ub-tag {
      font-size: 11px;
      color: var(--tm)
    }

    .icon-btn {
      width: 32px;
      height: 32px;
      border-radius: var(--r4);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--tm);
      flex-shrink: 0;
      transition: background .1s, color .1s;
    }

    .icon-btn:hover {
      background: var(--bg-hover);
      color: var(--t1)
    }

    .icon-btn.danger:hover {
      background: rgba(237, 66, 69, .15);
      color: var(--red)
    }

    /* ── AVATAR ─────────────────────────────────────── */
    .av {
      border-radius: 50%;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      overflow: hidden;
      position: relative;
    }

    .av img {
      position: absolute;
      inset: 0;
      border-radius: 50%
    }

    .sdot {
      position: absolute;
      bottom: 0;
      right: 0;
      border-radius: 50%;
      border: 2px solid var(--bg-side);
    }

    .s-on {
      background: var(--green)
    }

    .s-aw {
      background: var(--amber)
    }

    .s-of {
      background: var(--offline)
    }

    .s-dn {
      background: var(--red)
    }

    /* ── MAIN CONTENT ───────────────────────────────── */
    #main-content {
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: var(--bg-app)
    }

    #ch-header {
      height: 48px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 0 16px;
      background: var(--bg-app);
      border-bottom: 1px solid rgba(0, 0, 0, .4);
      box-shadow: 0 1px 0 rgba(0, 0, 0, .3);
    }

    #ch-header .ch-name {
      font-weight: 700;
      font-size: 16px;
      letter-spacing: .01em
    }

    .hdr-sep {
      width: 1px;
      height: 18px;
      background: rgba(255, 255, 255, .1);
      margin: 0 6px
    }

    .hdr-desc {
      font-size: 13px;
      color: var(--tm)
    }

    .hdr-right {
      margin-left: auto;
      display: flex;
      gap: 2px;
      align-items: center
    }

    /* ── MESSAGES ───────────────────────────────────── */
    #messages {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      background: linear-gradient(to bottom, var(--bg-app) 0%, var(--bg-app) 100%)
    }

    .msg-welcome {
      padding: 24px 16px 16px;
      border-bottom: 1px solid rgba(255, 255, 255, .05);
      margin-bottom: 12px;
    }

    .w-icon {
      font-size: 56px;
      margin-bottom: 10px
    }

    .w-title {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 4px
    }

    .w-sub {
      font-size: 14px;
      color: var(--tm)
    }

    .msg-group {
      display: flex;
      gap: 16px;
      padding: 2px 16px;
      position: relative;
      transition: background .06s;
    }

    .msg-group:hover {
      background: rgba(0, 0, 0, .2)
    }

    .msg-group.header {
      padding-top: 17px
    }

    .msg-group.sys {
      padding: 8px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .sys-line {
      flex: 1;
      height: 1px;
      background: rgba(255, 255, 255, .06)
    }

    .sys-txt {
      font-size: 12px;
      color: var(--tm);
      white-space: nowrap;
      font-style: italic
    }

    .sys-join .sys-txt {
      color: var(--green)
    }

    .sys-leave .sys-txt {
      color: var(--tm)
    }

    .msg-av {
      width: 40px;
      height: 40px;
      flex-shrink: 0;
      margin-top: 2px
    }

    .msg-stub {
      width: 40px;
      flex-shrink: 0;
      position: relative
    }

    .hover-ts {
      position: absolute;
      right: 2px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 10px;
      color: var(--tm);
      opacity: 0;
      pointer-events: none;
      white-space: nowrap;
    }

    .msg-group:hover .hover-ts {
      opacity: 1
    }

    .msg-body {
      flex: 1;
      min-width: 0
    }

    .msg-meta {
      display: flex;
      align-items: baseline;
      gap: 8px;
      margin-bottom: 3px
    }

    .msg-author {
      font-weight: 600;
      font-size: 15px;
      cursor: pointer
    }

    .msg-author:hover {
      text-decoration: underline
    }

    .msg-ts {
      font-size: 11px;
      color: var(--tm)
    }

    .msg-text {
      font-size: 15px;
      line-height: 1.4;
      color: var(--t1);
      word-break: break-word;
      white-space: pre-wrap
    }

    .msg-text.dim {
      color: var(--t2)
    }

    #typing-bar {
      padding: 4px 16px 10px;
      min-height: 24px;
      font-size: 13px;
      color: var(--tm)
    }

    .td {
      display: inline-block;
      animation: td 1.4s infinite;
      margin: 0 1px;
      font-size: 16px
    }

    .td:nth-child(2) {
      animation-delay: .2s
    }

    .td:nth-child(3) {
      animation-delay: .4s
    }

    @keyframes td {

      0%,
      80%,
      100% {
        opacity: .15
      }

      40% {
        opacity: 1
      }
    }

    /* ── INPUT ──────────────────────────────────────── */
    #input-wrap {
      padding: 0 16px 20px;
      flex-shrink: 0
    }

    .input-box {
      background: var(--bg-input);
      border-radius: var(--r8);
      display: flex;
      align-items: flex-end;
      padding: 0 4px 0 12px;
      gap: 4px;
      border: 1px solid rgba(255, 255, 255, .05);
    }

    #msg-input {
      flex: 1;
      max-height: 200px;
      padding: 11px 0;
      font-size: 15px;
      line-height: 1.4;
      color: var(--t1);
    }

    #msg-input:empty::before {
      content: attr(data-ph);
      color: var(--tm);
      pointer-events: none
    }

    .inp-acts {
      display: flex;
      align-items: flex-end;
      padding: 6px 0;
      gap: 2px
    }

    .inp-btn {
      width: 36px;
      height: 36px;
      border-radius: var(--r4);
      color: var(--tm);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background .1s, color .1s;
    }

    .inp-btn:hover {
      background: var(--bg-hover);
      color: var(--t1)
    }

    .inp-btn.send {
      color: var(--accent)
    }

    .inp-btn.send:hover {
      background: rgba(88, 101, 242, .15);
      color: var(--ah)
    }

    /* ── MEMBERS PANEL ──────────────────────────────── */
    #members-panel {
      background: var(--bg-side);
      overflow-y: auto;
      padding: 12px 0;
      border-left: 1px solid rgba(0, 0, 0, .3);
    }

    .mp-label {
      padding: 16px 8px 4px 16px;
      font-size: 11px;
      font-weight: 700;
      color: var(--tm);
      text-transform: uppercase;
      letter-spacing: .06em;
    }

    .mp-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 5px 8px 5px 16px;
      margin: 1px 8px;
      border-radius: var(--r4);
      cursor: default;
      position: relative;
    }

    .mp-item:hover {
      background: var(--bg-hover)
    }

    .mp-name {
      font-size: 14px;
      font-weight: 500;
      color: var(--t2)
    }

    .mp-item:hover .mp-name {
      color: var(--t1)
    }

    .mp-sub {
      font-size: 11px;
      color: var(--tm)
    }

    .mp-acts {
      margin-left: auto;
      display: flex;
      gap: 4px;
      opacity: 0;
      transition: opacity .15s;
      flex-shrink: 0
    }

    .mp-item:hover .mp-acts {
      opacity: 1
    }

    .mp-act {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: var(--bg-ele);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--tm);
      transition: background .12s, color .12s;
      flex-shrink: 0;
    }

    .mp-act:hover {
      background: var(--accent);
      color: #fff
    }

    .mp-act.vc:hover {
      background: var(--green);
      color: #fff
    }

    .mp-act svg {
      pointer-events: none
    }

    /* ── CALL OVERLAY ───────────────────────────────── */
    #call-overlay {
      position: fixed;
      inset: 0;
      z-index: 6000;
      background: #0b0c0e;
      display: none;
      flex-direction: column;
    }

    #call-overlay.open {
      display: flex
    }

    .call-topbar {
      height: 52px;
      flex-shrink: 0;
      background: #0d0e10;
      display: flex;
      align-items: center;
      padding: 0 20px;
      gap: 12px;
      border-bottom: 1px solid rgba(255, 255, 255, .06);
    }

    .call-topbar .call-title {
      font-size: 15px;
      font-weight: 600
    }

    .call-topbar .call-dur {
      font-size: 13px;
      color: var(--tm);
      margin-left: 4px
    }

    .call-live {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      font-weight: 700;
      color: #4ade80;
      background: rgba(74, 222, 128, .1);
      padding: 3px 10px;
      border-radius: 99px;
    }

    .call-live-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #4ade80;
      animation: pulse 2s infinite
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1;
        transform: scale(1)
      }

      50% {
        opacity: .5;
        transform: scale(.8)
      }
    }

    .call-videos {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      padding: 12px 16px;
      place-items: center;
      background: var(--bg-deep);
    }

    .call-videos.solo {
      grid-template-columns: 1fr
    }

    .video-tile {
      border-radius: var(--r8);
      background: #0d0f12;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      width: 100%;
      max-width: 680px;
      aspect-ratio: 16/9;
      border: 1px solid rgba(255, 255, 255, .06);
    }

    .video-tile.self {
      border-color: rgba(88, 101, 242, .4)
    }

    .video-tile video {

      left: 12px;
      background: rgba(0, 0, 0, .7);
      color: #fff;
      backdrop-filter: blur(8px);
      font-size: 13px;
      padding: 3px 10px;
      border-radius: var(--r4);
      z-index: 2;
      font-weight: 500;
    }

    .tile-muted {
      position: absolute;
      top: 10px;
      right: 10px;
      background: rgba(237, 66, 69, .9);
      border-radius: var(--r4);
      font-size: 11px;
      padding: 3px 8px;
      color: #fff;
      display: none;
      z-index: 2;
      display: flex;
      align-items: center;
      gap: 4px;

      display: none !important
    }

    .call-controls {
      height: 80px;
      background: #0d0e10;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      border-top: 1px solid rgba(255, 255, 255, .05);
      padding: 0 24px;
    }

    .call-ctrl-left {
      display: flex;
      gap: 10px;
      flex: 1;
      justify-content: flex-start
    }

    .call-ctrl-right {
      display: flex;
      gap: 10px;
      flex: 1;
      justify-content: flex-end
    }

    .cbtn {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    .cbtn button {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background .15s, transform .1s;
      color: #fff;
    }

    .cbtn button:hover {
      transform: scale(1.08)
    }

    .cbtn .clabel {
      font-size: 10px;
      color: var(--tm);
      white-space: nowrap;
      pointer-events: none
    }

    .cbtn.active button {
      background: #4f545c
    }

    .cbtn.muted button,
    .cbtn.camoff button {
      background: var(--red)
    }

    .cbtn.hangup button {
      background: var(--red);
      width: 56px;
      height: 56px
    }

    .cbtn.hangup button:hover {
      background: #c0392b
    }

    /* ── MODAL ──────────────────────────────────────── */
    .modal-bg {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, .75);

      display: none;
      align-items: center;
      justify-content: center;
    }

      padding: 8px 16px;

      font-size: 14px;
      font-weight: 500;
      background: var(--bg-hover);
      color: var(--t1);

    }

    }

    .mbtn.p {
      background: var(--accent);

    }

      { userId: 'bot1', username: 'Alice', color: '#5865F2' },
      { userId: 'bot2', username: 'Bob', color: '#3ba55d' },
      { userId: 'bot3', username: 'Carol', color: '#faa61a' },
      { userId: 'bot4', username: 'Dave', color: '#ed4245' },
    ];

    /* ═══════════════════ HELPERS ══════════════════════ */
    const Q = s => document.querySelector(s);
    const esc = s => String(s)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;')
      .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    const store = {
      get(k, d = null) { try { const v = localStorage.getItem(k); return v != null ? JSON.parse(v) : d } catch { return d } },
      set(k, v) { try { localStorage.setItem(k, JSON.stringify(v)) } catch (e) { console.warn('quota', e) } },
      del(k) { try { localStorage.removeItem(k) } catch { } }
    };
    const strColor = s => {
      const pal = ['#5865F2', '#3ba55d', '#faa61a', '#ed4245', '#eb459e', '#00AFF4', '#7289da', '#43b581'];
      let h = 0; for (let i = 0; i < s.length; i++) h = (h * 31 + s.charCodeAt(i)) >>> 0;
      return pal[h % pal.length];
    };
    const fmtFull = ts => {
      const d = new Date(ts), n = new Date();
      const t = d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
      if (d.toDateString() === n.toDateString()) return `Today at ${t}`;
      const y = new Date(n); y.setDate(n.getDate() - 1);
      if (d.toDateString() === y.toDateString()) return `Yesterday at ${t}`;
      return d.toLocaleDateString() + ' ' + t;
    };
    const fmtShort = ts => new Date(ts).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

    /* ═══════════════════ STATE ════════════════════════ */
    let user = store.get(K.USER, null);
    let currentRoom = store.get(K.ROOM, 'general');
    let unread = store.get(K.UNREAD, {});
    let drafts = store.get(K.DRAFTS, {});
    let channels = store.get(K.CHS, DEFAULT_CHS);
    let onlineUsers = [];   // { userId, username, avatar, status }
    let connStatus = 'demo';
    let wsConn = null, wsRetries = 0, wsTimer = null;
    let localStream = null, callTarget = null, callTimer = null, callSecs = 0;
    let BC = null; // BroadcastChannel
    let typTimer = null;
    let mpOpen = true;

    /* ═══════════════════ MESSAGES ═════════════════════ */
    const msgs = {
      key: r => `ca:m:${r}`,
      get: r => store.get(msgs.key(r), []),
      add(r, m) {
        const a = msgs.get(r);
        if (a.some(x => x.messageId === m.messageId)) return false; // dedup
        a.push(m); store.set(msgs.key(r), a.slice(-MAX_MSGS)); return true;
      }
    };

    /* ═══════════════════ BROADCAST (cross-tab) ════════ */
    function initBC() {
      try { BC = new BroadcastChannel('chatapp-v2'); BC.onmessage = e => handleBC(e.data); } catch { }
      window.addEventListener('storage', e => {
        if (e.key === K.BC && e.newValue) {
          try { handleBC(JSON.parse(e.newValue)); } catch { }
        }
      });
    }

    function bcSend(data) {
      const p = { ...data, _from: user.userId, _ts: Date.now() };
      if (BC) try { BC.postMessage(p); } catch { }
      store.set(K.BC, p); // storage event for cross-tab fallback
    }

    function handleBC(data) {
      if (!data || !user || data._from === user.userId) return;
      switch (data.type) {
        case 'JOIN':
          addOnline({ userId: data.userId, username: data.username, avatar: data.avatar || null, status: 'online' });
          sysMsg(currentRoom, `✨  ${data.username} joined the chat`, 'join');
          // respond with own presence
          setTimeout(() => bcSend({ type: 'HERE', userId: user.userId, username: user.username, avatar: user.avatar || null }), 80 + Math.random() * 200);
          break;
        case 'LEAVE':
          removeOnline(data.userId);
          sysMsg(currentRoom, `${data.username} left`, 'leave');
          break;
        case 'HERE': case 'BEAT':
          addOnline({ userId: data.userId, username: data.username, avatar: data.avatar || null, status: 'online' });
          // update their presence timestamp
          store.set(`ca:p:${data.userId}`, { userId: data.userId, username: data.username, avatar: data.avatar || null, ts: Date.now() });
          break;
        case 'WHO':
          setTimeout(() => bcSend({ type: 'HERE', userId: user.userId, username: user.username, avatar: user.avatar || null }), 80 + Math.random() * 250);
          break;
        case 'MSG':
          if (data.msg && data.msg.senderId !== user?.userId) {
            const bm = normalizeMsg(data.msg);
            sentIds.add(bm.messageId);  // WS will echo this too — skip it
            const bl = msgs.get(bm.roomId);
            const bp = bl.length > 0 ? bl[bl.length - 1] : null;
            const bg = !!(bp && bp.senderId === bm.senderId
              && bp.type === 'TEXT' && (bm.ts - bp.ts) < 5 * 60 * 1000);
            msgs.add(bm.roomId, bm);
            if (bm.roomId === currentRoom) appendMsgEl(bm, bg);
            else bumpUnread(bm.roomId);
          }
          break;
        case 'SYS':
          if (data.roomId) sysMsg(data.roomId, data.text, data.cls || '');
          break;
      }
    }

    function initPresence() {
      writePresence();
      bcSend({ type: 'JOIN', userId: user.userId, username: user.username, avatar: user.avatar || null });
      setTimeout(() => bcSend({ type: 'WHO', userId: user.userId }), 200);
      // load saved presences from localStorage immediately
      loadSavedPresences();
      // heartbeat every 8s
      setInterval(() => { writePresence(); bcSend({ type: 'BEAT', userId: user.userId, username: user.username, avatar: user.avatar || null }); }, 8000);
      // sweep stale every 12s
      setInterval(sweepPresence, 12000);
      // cleanup
      window.addEventListener('beforeunload', () => {
        store.del(`ca:p:${user.userId}`);
        bcSend({ type: 'LEAVE', userId: user.userId, username: user.username });
      });
    }

    function writePresence() {
      store.set(`ca:p:${user.userId}`, { userId: user.userId, username: user.username, avatar: user.avatar || null, ts: Date.now() });
    }

    function loadSavedPresences() {
      const now = Date.now(); const TTL = 20000;
      Object.keys(localStorage)
        .filter(k => k.startsWith('ca:p:') && k !== `ca:p:${user.userId}`)
        .forEach(k => {
          try {
            const p = JSON.parse(localStorage.getItem(k));
            if (p && now - p.ts < TTL) addOnline({ userId: p.userId, username: p.username, avatar: p.avatar || null, status: 'online' });
          } catch { }
        });
    }

    function sweepPresence() {
      const now = Date.now(); const TTL = 20000;
      Object.keys(localStorage)
        .filter(k => k.startsWith('ca:p:') && k !== `ca:p:${user.userId}`)
        .forEach(k => {
          try {
            const p = JSON.parse(localStorage.getItem(k));
            if (!p || now - p.ts > TTL) {
              removeOnline(k.replace('ca:p:', ''));
              localStorage.removeItem(k);
            }
          } catch { }
        });
    }

    /* ═══════════════════ WEBSOCKET ════════════════════ */
    function tryConnect() {
      if (!WS_URL) { setStatus('demo'); return; }
      setStatus('connecting'); clearTimeout(wsTimer);
      try {
        wsConn = new WebSocket(`${WS_URL}?userId=${encodeURIComponent(user.userId)}&username=${encodeURIComponent(user.username)}`);
        wsConn.onopen = () => {
          wsRetries = 0; setStatus('connected');
          wsSend({ type: 'JOIN_ROOM', roomId: currentRoom });
          wsSend({ type: 'WHO_IS_ONLINE' }); // get fresh user list from server
        };
        wsConn.onmessage = e => { try { handleWsMsg(JSON.parse(e.data)); } catch { } };
        wsConn.onclose = () => { if (connStatus !== 'demo') { setStatus('reconnecting'); schedRec(); } };
        wsConn.onerror = () => { };
      } catch { schedRec(); }
    }
    function schedRec() {
      if (wsRetries >= 5) { setStatus('demo'); return; }
      wsTimer = setTimeout(tryConnect, Math.min(1000 * Math.pow(2, wsRetries++), 30000));
    }
    function wsSend(data) {
      if (wsConn?.readyState === 1) { wsConn.send(JSON.stringify(data)); return true; }
      return false;
    }
    function handleWsMsg(m) {
      switch (m.type) {
        case 'MESSAGE': receiveMsg(m); break;
        case 'HISTORY': onHistory(m); break;
        case 'USERS_LIST':
          onlineUsers = (m.users || []).filter(u => u.userId !== user?.userId);
          renderMP(); break;
        case 'USER_JOINED': addOnline(m); sysMsg(currentRoom, `✨ ${m.username} joined`, 'join'); break;
        case 'USER_LEFT': removeOnline(m.userId); sysMsg(currentRoom, `${m.username || ''} left`, 'leave'); break;
        case 'USER_UPDATED': onUserUpdated(m); break;
        case 'TYPING': onSrvTyping(m); break;
        case 'VOICE_MEMBERS': onVoiceMembers(m); break;
        case 'VOICE_USER_JOINED': onVoiceUserJoined(m); break;
        case 'VOICE_USER_LEFT': onVoiceUserLeft(m); break;
        case 'WEBRTC_OFFER': onWsOffer(m); break;
        case 'WEBRTC_ANSWER': onWsAnswer(m); break;
        case 'WEBRTC_ICE_CANDIDATE': onWsIce(m); break;
        case 'WEBRTC_HANGUP': endCall(false); break;
      }
    }

    /* Server sent message history for a room on JOIN_ROOM */
    function onHistory(m) {
      const list = m.messages || [];
      // Clear stale local cache for this room, then repopulate from server (source of truth)
      store.del(msgs.key(m.roomId));
      list.forEach(raw => { const n = normalizeMsg(raw); msgs.add(n.roomId, n); });
      if (m.roomId === currentRoom) renderMessages();
    }

    /* Another user's avatar changed — update members panel + local cache */
    function onUserUpdated(m) {
      if (m.userId === user?.userId) { user.avatar = m.avatar; store.set(K.USER, user); renderUserBar(); }
      const idx = onlineUsers.findIndex(u => u.userId === m.userId);
      if (idx !== -1) { onlineUsers[idx].avatar = m.avatar; renderMP(); }
    }

    /* Typing indicator relayed from server (authoritative for cross-browser) */
    let _typClr;
    function onSrvTyping(m) {
      if (m.roomId !== currentRoom || m.userId === user?.userId) return;
      const tb = Q('#typing-bar');
      tb.innerHTML = `<span class="td">●</span><span class="td">●</span><span class="td">●</span>  <strong>${esc(m.username || 'Someone')}</strong> is typing…`;
      clearTimeout(_typClr);
      _typClr = setTimeout(() => { tb.innerHTML = ''; }, 3000);
    }

    /* Normalise a server message payload into the local message shape */
    function normalizeMsg(data) {
      return {
        messageId: data.messageId || crypto.randomUUID(),
        roomId: data.roomId || currentRoom,
        senderId: data.senderId || '_sys',
        senderName: data.senderName || data.senderId || 'System',
        senderAvatar: data.senderAvatar || null,
        senderColor: strColor(data.senderId || '_sys'),
        content: data.content || '',
        type: data.msgType || data.type || 'TEXT',  // server sends msgType
        ts: data.ts || Date.now()
      };
    }
    function setStatus(s) {
      connStatus = s;
      const b = Q('#banner');
      const map = {
        connecting: '🔄  Connecting…', reconnecting: '⚠  Reconnecting…',
        connected: '', demo: '🟢  Demo mode — open multiple tabs to chat with yourself!'
      };
      b.className = s; b.textContent = map[s] || '';
      b.style.display = ['connecting', 'reconnecting', 'demo'].includes(s) ? 'flex' : 'none';
      const top = b.style.display === 'flex' ? '34px' : '0';
      Q('#app').style.marginTop = top;
      Q('#call-overlay').style.top = top;
      renderUserBar();
    }

    /* ═══════════════════ ONLINE USERS ═════════════════ */
    function addOnline(u) {
      if (!u || u.userId === user.userId) return;
      const i = onlineUsers.findIndex(x => x.userId === u.userId);
      if (i === -1) onlineUsers.push({ ...u, status: 'online' });
      else onlineUsers[i] = { ...onlineUsers[i], ...u, status: 'online' };
      renderMP();
    }
    function removeOnline(uid) {
      onlineUsers = onlineUsers.filter(u => u.userId !== uid); renderMP();
    }

    /* ═══════════════════ MESSAGES ═════════════════════ */
    function buildMsgEl(m, grouped) {
      const el = document.createElement('div');
      if (m.type === 'JOIN' || m.type === 'LEAVE' || m.type === 'SYSTEM') {
        el.className = `msg-group sys sys-${m.type === 'JOIN' ? 'join' : 'leave'}`;
        el.innerHTML = `<div class="sys-line"></div><span class="sys-txt">${esc(m.content)}</span><div class="sys-line"></div>`;
        return el;
      }
      el.className = `msg-group${grouped ? '' : ' header'}`;
      el.dataset.id = m.messageId;
      const col = m.senderColor || strColor(m.senderId);
      const init = (m.senderName || '?')[0].toUpperCase();
      const hasAv = m.senderAvatar && m.senderAvatar.startsWith('data:');
      const avHtml = grouped
        ? `<div class="msg-stub"><span class="hover-ts">${fmtShort(m.ts)}</span></div>`
        : `<div class="msg-av av" style="width:40px;height:40px;font-size:15px;background:${hasAv ? 'transparent' : col}">
        ${hasAv ? `<img src="${esc(m.senderAvatar)}" alt="">` : init}
       </div>`;
      const metaHtml = grouped ? '' :
        `<div class="msg-meta">
      <span class="msg-author" style="color:${col}">${esc(m.senderName || 'Unknown')}</span>
      <span class="msg-ts">${fmtFull(m.ts)}</span>
     </div>`;
      el.innerHTML = `${avHtml}<div class="msg-body">${metaHtml}<div class="msg-text">${esc(m.content)}</div></div>`;
      return el;
    }

    function appendMsgEl(m, grouped) {
      const c = Q('#messages'); if (!c) return;
      const atBot = c.scrollHeight - c.scrollTop - c.clientHeight < 150;
      c.appendChild(buildMsgEl(m, grouped));
      if (atBot) c.scrollTop = c.scrollHeight;
    }

    function sysMsg(roomId, text, cls = '') {
      const m = {
        messageId: crypto.randomUUID(), roomId, senderId: '_sys', senderName: 'System',
        content: text, type: cls === 'join' ? 'JOIN' : cls === 'leave' ? 'LEAVE' : 'SYSTEM', ts: Date.now()
      };
      if (roomId === currentRoom) appendMsgEl(m, false);
      // not stored — disappears on room switch/refresh, which is correct
    }

    function renderMessages() {
  const c = Q('#messages'); if (!c) return;
  c.innerHTML='';
  const isDM = currentRoom.startsWith('dm-');
  const displayName = isDM ? chDisplayName(currentRoom) : currentRoom;
  const welcome = document.createElement('div');
  welcome.className='msg-welcome';
  welcome.innerHTML = isDM
    ? `<div class="w-icon">💬</div>
       <div class="w-title">@ ${esc(displayName)}</div>
       <div class="w-sub">This is the start of your DM with <strong>${esc(displayName)}</strong>.</div>`
    : `<div class="w-icon">💬</div>
       <div class="w-title"># ${esc(displayName)}</div>
       <div class="w-sub">Start of the #${esc(displayName)} channel.</div>`;
  c.appendChild(welcome);
  const list = msgs.get(currentRoom);
  const frag = document.createDocumentFragment();
  let lastSender='', lastTs=0;
  list.forEach(m=>{
    const grouped = m.senderId===lastSender && m.type==='TEXT' && (m.ts-lastTs)<5*60*1000;
    frag.appendChild(buildMsgEl(m,grouped));
    lastSender=m.senderId; lastTs=m.ts;
  });
  c.appendChild(frag);
  c.scrollTop=c.scrollHeight;
}

    function receiveMsg(data) {
      const m = normalizeMsg(data);
      if (sentIds.has(m.messageId)) {
        sentIds.delete(m.messageId);
        msgs.add(m.roomId, m);  // ensure stored, but don't re-render
        return;
      }
      const listBefore = msgs.get(m.roomId);
      const prev = listBefore.length > 0 ? listBefore[listBefore.length - 1] : null;
      const grouped = !!(prev && prev.senderId === m.senderId
        && prev.type === 'TEXT' && (m.ts - prev.ts) < 5 * 60 * 1000);
      msgs.add(m.roomId, m);
      if (m.roomId === currentRoom) appendMsgEl(m, grouped);
      else bumpUnread(m.roomId);
    }


    function sendMsg() {
      const inp = Q('#msg-input');
      const content = inp.innerText.trim(); if (!content) return;

      const listBefore = msgs.get(currentRoom);
      const prev = listBefore.length > 0 ? listBefore[listBefore.length - 1] : null;
      const grouped = !!(prev && prev.senderId === user.userId
        && prev.type === 'TEXT' && (Date.now() - prev.ts) < 5 * 60 * 1000);

      const m = {
        messageId: crypto.randomUUID(), roomId: currentRoom,
        senderId: user.userId, senderName: user.username,
        senderAvatar: user.avatar || null, senderColor: strColor(user.userId),
        content, type: 'TEXT', ts: Date.now()
      };

      sentIds.add(m.messageId);  // server will echo this back — skip it in receiveMsg
      msgs.add(currentRoom, m);
      appendMsgEl(m, grouped);   // render now with correct grouped value

      inp.innerText = ''; drafts[currentRoom] = ''; store.set(K.DRAFTS, drafts);
      bcSend({ type: 'MSG', msg: m });
      if (!wsSend({ type: 'SEND_MESSAGE', roomId: currentRoom, content, messageId: m.messageId })) {
        if (connStatus === 'demo') fakeReply();
      }
    }

    function fakeReply() {
      const u = DEMO_BOTS[Math.floor(Math.random() * DEMO_BOTS.length)];
      const text = BOT_LINES[Math.floor(Math.random() * BOT_LINES.length)];
      const tb = Q('#typing-bar');
      tb.innerHTML = `<span class="td">●</span><span class="td">●</span><span class="td">●</span>  <strong>${esc(u.username)}</strong> is typing…`;
      setTimeout(() => {
        tb.innerHTML = '';
        receiveMsg({ senderId: u.userId, senderName: u.username, content: text, type: 'TEXT', ts: Date.now() });
      }, 1200 + Math.random() * 1500);
    }

    /* ═══════════════════ ROOMS ════════════════════════ */
function switchRoom(roomId, notify=true) {
  const inp = Q('#msg-input');
  if (inp && currentRoom){ drafts[currentRoom]=inp.innerText; store.set(K.DRAFTS,drafts); }
  currentRoom=roomId; store.set(K.ROOM,roomId);
  delete unread[roomId]; store.set(K.UNREAD,unread);
  document.querySelectorAll('.ch-item[data-room]').forEach(el=>{
    el.classList.toggle('active', el.dataset.room===roomId);
    el.querySelector('.ch-badge')?.remove();
  });
  const isDM = roomId.startsWith('dm-');
  const displayName = isDM ? chDisplayName(roomId) : roomId;
  // update the # / @ icon before the channel name
  const hdrIcon = Q('#ch-header span');
  if (hdrIcon) hdrIcon.textContent = isDM ? '@' : '#';
  Q('#ch-name').textContent = displayName;
  Q('#ch-desc').textContent = isDM ? `Direct message with ${displayName}` : `${displayName} channel`;
  if (inp){
    inp.dataset.ph = `Message ${isDM?'@':'#'}${displayName}`;
    inp.innerText = drafts[roomId]||'';
  }
  renderMessages();
  if (notify) wsSend({ type:'JOIN_ROOM', roomId });
}

    function bumpUnread(roomId) {
      unread[roomId] = (unread[roomId] || 0) + 1; store.set(K.UNREAD, unread);
      const el = document.querySelector(`.ch-item[data-room="${roomId}"]`); if (!el) return;
      let b = el.querySelector('.ch-badge');
      if (!b) { b = document.createElement('span'); b.className = 'ch-badge'; el.appendChild(b); }
      b.textContent = unread[roomId];
    }

 function openDM(uid, uname) {
  const dmId = 'dm-' + [user.userId, uid].sort().join('-');
  // persist name so DM label works even when other user is offline
  const dmNames = store.get('ca:dmnames', {});
  dmNames[dmId] = uname; store.set('ca:dmnames', dmNames);
  if (!channels.text.includes(dmId)) {
    channels.text.push(dmId);
    store.set(K.CHS, channels);
    renderChs();
  }
  switchRoom(dmId);
}



 function chDisplayName(roomId) {
  if (!roomId.startsWith('dm-')) return roomId;
  const parts = roomId.split('-');
  if (parts.length < 11) return roomId;
  const uid1 = parts.slice(1,6).join('-');
  const uid2 = parts.slice(6,11).join('-');
  const otherId = uid1 === user.userId ? uid2 : uid1;
  const online = onlineUsers.find(u => u.userId === otherId);
  if (online) return online.username;
  const stored = store.get('ca:dmnames', {})[roomId];
  if (stored) return stored;
  return otherId.substring(0,8)+'…';
}

    /* ═══════════════════ CHANNEL LIST ═════════════════ */
    function renderChs() {
  const list = Q('#ch-list'); if (!list) return;
  list.innerHTML = '';

  function cat(label, addable) {
    const el = document.createElement('div'); el.className = 'ch-cat';
    el.innerHTML = `<svg width="9" height="9" viewBox="0 0 9 9" fill="none"
      stroke="currentColor" stroke-width="1.5"><path d="M1 2.5l3.5 4L8 2.5"/></svg>
      ${label}
      ${addable?`<span class="cat-plus"
        onclick="event.stopPropagation();openModal('add-ch-modal')"
        title="New channel">＋</span>`:''}`;
    return el;
  }

  function chItem(ch, icon, isVoice) {
    const el = document.createElement('div');
    el.className = 'ch-item'+(ch===currentRoom&&!isVoice?' active':'');
    el.dataset.room = ch;
    const n = unread[ch]||0;
    const label = ch.startsWith('dm-') ? chDisplayName(ch) : ch;
    el.innerHTML = `<em class="ch-icon">${icon}</em>
      <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">
        ${esc(label)}
      </span>
      ${n>0&&!isVoice?`<span class="ch-badge">${n}</span>`:''}`;
    el.onclick = () => {
      if (!isVoice) { switchRoom(ch); return; }
      if (currentVoiceChannel===ch) { endCall(); return; }
      joinVoice(ch);
    };
    el.title = isVoice ? 'Click join · Right-click watch' : '';
    el.oncontextmenu = isVoice ? e=>{ e.preventDefault(); watchVoice(ch); } : null;
    return el;
  }

  list.appendChild(cat('TEXT CHANNELS', true));
  channels.text.forEach(ch => list.appendChild(chItem(ch, ch.startsWith('dm-')?'@':'#', false)));
  list.appendChild(cat('VOICE CHANNELS', false));
  channels.voice.forEach(ch => list.appendChild(chItem(ch, '🔊', true)));
}

    function doAddCh() {
      const n = Q('#new-ch-name').value.trim().toLowerCase().replace(/\s+/g, '-'); if (!n) return;
      if (!channels.text.includes(n)) { channels.text.push(n); store.set(K.CHS, channels); renderChs(); }
      Q('#new-ch-name').value = ''; closeModal('add-ch-modal'); switchRoom(n);
    }

    // function joinVoice(ch) {
    //   startCall('bot1', 'Alice', null, ch);
    // }
    // ── Voice channels ─────────────────────────────────
    function joinVoice(ch) {
      if (currentVoiceChannel === ch) return;
      if (currentVoiceChannel) leaveVoice();
      currentVoiceChannel = ch;
      clearRemoteTiles();
      Q('#call-overlay').classList.add('open');
      Q('#call-title').textContent = `🔊 ${ch}`;
      Q('#local-label').textContent = user.username + ' (you)';
      Q('#local-av').textContent = user.username[0].toUpperCase();
      Q('#local-av').style.color = strColor(user.userId);
      callSecs = 0; clearInterval(callTimer);
      callTimer = setInterval(() => { callSecs++; Q('#call-dur').textContent = fmtDur(callSecs); }, 1000);
      navigator.mediaDevices?.getUserMedia({ video: true, audio: true })
        .then(stream => {
          localStream = stream;
          const v = Q('#vid-local'); v.srcObject = stream; v.play().catch(() => { });
          Q('#local-av').style.display = 'none';
          wsSend({ type: 'JOIN_VOICE', channelId: ch });
        })
        .catch(() => { wsSend({ type: 'JOIN_VOICE', channelId: ch }); });
    }

    function watchVoice(ch) {
      if (currentVoiceChannel === ch) return;
      if (currentVoiceChannel) leaveVoice();
      currentVoiceChannel = ch;
      clearRemoteTiles();
      Q('#call-overlay').classList.add('open');
      Q('#call-title').textContent = `👁 Watching ${ch}`;
      Q('#local-label').textContent = '(watching)';
      Q('#local-av').textContent = '👁'; Q('#local-av').style.display = '';
      Q('#vid-local').srcObject = null;
      wsSend({ type: 'JOIN_VOICE', channelId: ch, watchOnly: true });
    }

    function leaveVoice() {
      if (currentVoiceChannel) wsSend({ type: 'LEAVE_VOICE', channelId: currentVoiceChannel });
      pcs.forEach(pc => pc.close()); pcs.clear();
      currentVoiceChannel = null;
      localStream?.getTracks().forEach(t => t.stop()); localStream = null;
    }

    // ── Voice event handlers ────────────────────────────
    function onVoiceMembers(m) {
      (m.members || []).forEach(mem => addRemoteTile(mem.userId, mem.username, mem.avatar));
    }

    async function onVoiceUserJoined(m) {
      addRemoteTile(m.userId, m.username, m.avatar);
      if (m.shouldCall) await callPeer(m.userId, m.username);
    }

    function onVoiceUserLeft(m) {
      removeRemoteTile(m.userId);
      const pc = pcs.get(m.userId); if (pc) { pc.close(); pcs.delete(m.userId); }
    }

    // ── WebRTC ─────────────────────────────────────────
    function mkPc(remoteId) {
      const pc = new RTCPeerConnection(rtcConfig);
      pcs.set(remoteId, pc);
      if (localStream) localStream.getTracks().forEach(t => pc.addTrack(t, localStream));
      pc.ontrack = e => setTileStream(remoteId, e.streams[0]);
      pc.onicecandidate = e => {
        if (e.candidate) wsSend({
          type: 'WEBRTC_ICE_CANDIDATE', toUserId: remoteId,
          candidate: JSON.stringify(e.candidate)
        });
      };
      return pc;
    }

    async function callPeer(remoteId, remoteName) {
      const pc = mkPc(remoteId);
      const offer = await pc.createOffer();
      await pc.setLocalDescription(offer);
      wsSend({ type: 'WEBRTC_OFFER', toUserId: remoteId, sdp: JSON.stringify(pc.localDescription) });
    }

    async function onWsOffer(m) {
      // If call overlay isn't open and it's a direct call (not voice channel), ask user
      if (!currentVoiceChannel && !Q('#call-overlay').classList.contains('open')) {
        const name = m.fromUsername || m.fromUserId || 'Unknown';
        if (!confirm(`📹 Incoming call from ${name}. Accept?`)) {
          wsSend({ type: 'WEBRTC_HANGUP', toUserId: m.fromUserId }); return;
        }
        Q('#call-overlay').classList.add('open');
        Q('#call-title').textContent = `Video Call — ${name}`;
        Q('#local-label').textContent = user.username + ' (you)';
        try {
          localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
          const v = Q('#vid-local'); v.srcObject = localStream; v.play().catch(() => { });
          Q('#local-av').style.display = 'none';
        } catch (e) { }
        addRemoteTile(m.fromUserId, name, null);
      }
      const pc = mkPc(m.fromUserId);
      await pc.setRemoteDescription(JSON.parse(m.sdp));
      const answer = await pc.createAnswer();
      await pc.setLocalDescription(answer);
      wsSend({ type: 'WEBRTC_ANSWER', toUserId: m.fromUserId, sdp: JSON.stringify(pc.localDescription) });
    }

    async function onWsAnswer(m) {
      const pc = pcs.get(m.fromUserId);
      if (pc) try { await pc.setRemoteDescription(JSON.parse(m.sdp)); } catch (e) { }
    }

    async function onWsIce(m) {
      const pc = pcs.get(m.fromUserId);
      if (pc && m.candidate) try { await pc.addIceCandidate(JSON.parse(m.candidate)); } catch (e) { }
    }

      const lav = Q('#local-av'); lav.textContent = user.username[0].toUpperCase(); lav.style.color = strColor(user.userId);
      // call duration timer
      callSecs = 0; clearInterval(callTimer);
      callTimer = setInterval(() => { callSecs++; Q('#call-dur').textContent = fmtDur(callSecs); }, 1000);
      // get user media
      navigator.mediaDevices?.getUserMedia({ video: true, audio: true })
        .then(stream => {
          localStream = stream;
          const v = Q('#vid-local'); v.srcObject = stream; v.play().catch(() => { });
          Q('#local-av').style.display = 'none';
          wsSend({ type: 'WEBRTC_OFFER', toUserId: targetId, sdp: 'offer-placeholder' });
        })
        .catch(() => { Q('#local-av').style.display = ''; });

    const fmtDur = s => { const m = Math.floor(s / 60), sec = s % 60; return `${m}:${String(sec).padStart(2, '0')}`; };

        wsSend({ type: 'WEBRTC_ANSWER', toUserId: msg.fromUserId, sdp: 'answer' });
      } else { wsSend({ type: 'WEBRTC_HANGUP', toUserId: msg.fromUserId }); }
    }

   function shareScreen() {
  navigator.mediaDevices?.getDisplayMedia({ video: true, audio: false })
    .then(stream => {
      const screenTrack = stream.getVideoTracks()[0];

      // Push to every active peer connection — this is what makes remote see it
      pcs.forEach(pc => {
        const sender = pc.getSenders().find(s => s.track?.kind === 'video');
        if (sender) sender.replaceTrack(screenTrack).catch(() => {});
      });

      const v = Q('#vid-local'); v.srcObject = stream; v.play().catch(() => {});
      Q('#local-av').style.display = 'none';

      // When user stops sharing, restore camera
      screenTrack.onended = () => {
        const camTrack = localStream?.getVideoTracks()[0];
        if (camTrack) {
          pcs.forEach(pc => {
            const sender = pc.getSenders().find(s => s.track?.kind === 'video');
            if (sender) sender.replaceTrack(camTrack).catch(() => {});
          });
          const lv = Q('#vid-local'); lv.srcObject = localStream; lv.play().catch(() => {});
        }
      };
    }).catch(() => {});
}

 function applyAv(b64) {

    /* ═══════════════════ AVATAR PICKER ════════════════ */
   function pickAvatar(ev, prevId, initId, onDone) {
  const f = ev.target.files[0]; if (!f) return;
  if (f.size > 512 * 1024) { alert('Image too large — max 512 KB'); return; }
  const r = new FileReader();
  r.onload = e => {
    const p = Q('#'+prevId), i = Q('#'+initId);
    p.src = e.target.result; p.classList.add('ok');
    if (i) i.style.display = 'none';
    if (onDone) onDone(e.target.result);  // called AFTER data is ready
  };
  r.readAsDataURL(f);
}

    /* ═══════════════════ BOOT ═════════════════════════ */
    function startApp() {
      Q('#login-screen').style.display = 'none';
      Q('#app').style.display = 'grid';
      initBC();
      initPresence();
      channels.text = [...new Set(channels.text)];   // remove any duplicate DM entries
      store.set(K.CHS, channels);
      renderChs();
      renderUserBar();
      renderMP();
      switchRoom(currentRoom, false);
      tryConnect();
      // reconnect on focus
      document.addEventListener('visibilitychange', () => {
        if (!document.hidden && connStatus !== 'connected' && user) tryConnect();
      });
      window.addEventListener('online', tryConnect);
      window.addEventListener('offline', () => setStatus('reconnecting'));
      setInterval(() => wsSend({ type: 'HEARTBEAT' }), 25000);
    }

    function doLogin() {
      const n = Q('#login-name').value.trim(); if (!n) { Q('#login-name').focus(); return; }
      const avSrc = Q('#av-prev').src;
      user = { userId: crypto.randomUUID(), username: n, avatar: avSrc && avSrc.startsWith('data:') ? avSrc : null, joinedAt: new Date().toISOString() };
      store.set(K.USER, user); startApp();
    }

    // Init
    if (user) { Q('#login-screen').style.display = 'none'; startApp(); }
  </script>
</body>

</html>
